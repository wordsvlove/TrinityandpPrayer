<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5月靈修旅程：三一本體與主禱文</title>
  <style>
    :root {
      --bg-main: #0f111a;
      --bg-card: #1a1d2d;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #d4af37; 
      --accent-hover: #fcd34d;
      --bible-bg: rgba(212, 175, 55, 0.05);
      --border-color: #2e334d;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'PingFang HK', 'STHeiti', 'Microsoft JhengHei', sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.7;
    }

    .app-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      color: var(--accent);
      font-size: 28px;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    header p {
      color: var(--text-muted);
      font-size: 15px;
    }

    /* Content Area */
    .content-area {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 35px;
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: none; 
    }

    .day-title {
      color: var(--accent);
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 15px;
      text-align: center;
    }

    .tts-container {
      text-align: center;
      margin-bottom: 25px;
      border-bottom: 1px dashed var(--border-color);
      padding-bottom: 20px;
    }

    .tts-btn {
      background-color: var(--accent);
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .tts-btn:hover {
      background-color: var(--accent-hover);
    }

    .tts-btn.playing {
      background-color: #ef4444;
      color: #fff;
    }

    .section-title {
      font-size: 16px;
      color: #fff;
      font-weight: bold;
      margin-top: 30px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 16px;
      background-color: var(--accent);
      margin-right: 10px;
      border-radius: 2px;
    }

    .bible-text {
      font-style: italic;
      color: #cbd5e1;
      padding: 15px 20px;
      background: var(--bible-bg);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      font-size: 16px;
      margin-bottom: 10px;
    }

    .text-block {
      color: var(--text-main);
      text-align: justify;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .meditation-box {
      background-color: rgba(255, 255, 255, 0.03);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .meditation-box ul {
      margin: 0;
      padding-left: 20px;
      color: #e2e8f0;
    }

    .meditation-box li {
      margin-bottom: 10px;
    }

    .prayer-text {
      color: #fbbf24;
      font-weight: 500;
      font-size: 17px;
      padding-top: 10px;
    }

    /* Calendar Grid */
    .calendar-container {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .day-btn {
      background-color: var(--bg-main);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 0;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .day-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    .day-btn.active {
      background-color: var(--accent);
      color: #000;
      font-weight: bold;
      border-color: var(--accent);
    }

    .system-msg {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
      font-size: 16px;
      border: 1px dashed var(--border-color);
      border-radius: 12px;
      margin-bottom: 40px;
    }

    @media (max-width: 600px) {
      .calendar-grid { grid-template-columns: repeat(5, 1fr); }
      .content-area { padding: 20px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>5月靈修旅程</h1>
      <p>尋源三一真神・活出主禱生命</p>
    </header>

    <div id="content-area" class="content-area">
      <h2 id="view-title" class="day-title"></h2>
      
      <div class="tts-container">
        <button id="tts-btn" class="tts-btn" onclick="toggleAudio()">
          <svg id="tts-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
          <span id="play-btn-text">聆聽靈修內容</span>
        </button>
      </div>
      
      <div class="section-title">經文</div>
      <div id="view-bible" class="bible-text"></div>
      
      <div class="section-title" id="extra-bible-title" style="display: none;">默想經文</div>
      <div id="view-extra-bible" class="bible-text" style="display: none;"></div>

      <div class="section-title">聖言反思</div>
      <div id="view-reflection" class="text-block"></div>

      <div class="section-title">心靈觀照</div>
      <div id="view-observation" class="text-block"></div>
      
      <div class="section-title">深度默想與實踐</div>
      <div class="meditation-box">
        <ul id="view-meditation"></ul>
      </div>
      
      <div class="section-title">結束禱告</div>
      <div id="view-prayer" class="prayer-text"></div>
    </div>

    <div id="empty-state" class="system-msg" style="display: none;">
      載入中，請稍候...
    </div>

    <div class="calendar-container">
      <div class="calendar-header">
        <span style="font-weight: bold; color: var(--accent);">往日回顧與選擇</span>
        <span id="status-text" style="font-size: 14px; color: var(--text-muted);">載入中...</span>
      </div>
      <div class="calendar-grid" id="calendar-grid">
        <!-- Buttons will be generated by JS -->
      </div>
    </div>

  </div>

      },
      {

        meditation: [
          "在你的工作或事奉中，你是在尋求神的榮耀，還是自己的光環？",
          "求神釋放你脫離「求人讚美」的捆綁，單單以榮耀祂為樂。"

        prayer: "榮耀嘅神，求祢赦免我成日想出風頭、想人讚嘅虛榮心。教識我謙卑，令我所做嘅一切都單單為咗榮耀祢，唔再計較自己嘅得失。阿們。"

        reflection: "「阿們 (Amen)」源於希伯來文，意思是「真實的、誠心所願、必然成就」。這不僅是禱告的結束語，更是一個充滿信心的印記。我們深信，這31天裡我們所默想的關於上帝的愛、供應、赦免與拯救，在基督裡都是真實不變的。上帝的國度、權柄與榮耀不受時間限制，「直到永遠」是我們盼望的終極保障。",

          "回顧這一個月，哪一句《主禱文》的祈求最深地觸動了你的心？",

        ],
        prayer: "愛我嘅天父，多謝祢呢一個月嘅帶領。我對祢嘅應許同拯救講聲『阿們』！求祢帶領我，將主禱文化作我每日嘅生命見證，直到永遠。阿們！"

    const state = {
      selectedDay: 1,
      utterance: null
    };

    // 取得廣東話女聲（優先尋找「海兒/HiuGa」）
    function getCantoneseVoice() {
      const voices = window.speechSynthesis.getVoices();
      // 1. 首選 Microsoft HiuGa (海兒) 或明確為 zh-HK 的女聲
      let voice = voices.find(v => v.lang === 'zh-HK' && (v.name.includes('HiuGa') || v.name.includes('海兒')));
      // 2. 次選 Apple 語音 (Sin-Ji 等) 
      if (!voice) voice = voices.find(v => v.lang === 'zh-HK' && (v.name.includes('Sin-Ji') || v.name.includes('Sinji') || v.name.includes('Female')));
      // 3. 備選任何 zh-HK 語音
      if (!voice) voice = voices.find(v => v.lang === 'zh-HK');
      // 4. 最後備選任何中文語音
      if (!voice) voice = voices.find(v => v.lang.startsWith('zh'));
      return voice;
    }

    // 確保語音庫載入
    if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = getCantoneseVoice;
    }

    function toggleAudio() {
      const btn = document.getElementById('tts-btn');
      const btnText = document.getElementById('play-btn-text');

      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        btn.classList.remove('playing');
        btnText.innerText = '聆聽靈修內容';
        return;
      }

      const data = devotionals.find(d => d.day === state.selectedDay);
      if (!data) return;

      // 清除聖經章節名稱，僅保留「」內的經文
      const extractQuote = (str) => {
        const idx = str.indexOf('「');
        return idx !== -1 ? str.substring(idx) : str;
      };

      const title = data.title.replace(/Day \d+：/, '');
      let textToRead = `${title}。\n`;
      textToRead += `經文：${extractQuote(data.bible)}\n`;
      if (data.extraBible) {
        textToRead += `相關經文：${extractQuote(data.extraBible)}\n`;
      }
      textToRead += `聖言反思：${data.reflection}\n`;
      textToRead += `心靈觀照：${data.observation}\n`;
      textToRead += `深度默想與實踐：\n`;
      data.meditation.forEach((m, idx) => {
        textToRead += `第${idx + 1}。${m}\n`;
      });
      textToRead += `結束禱告：${data.prayer}`;

      state.utterance = new SpeechSynthesisUtterance(textToRead);
      const voice = getCantoneseVoice();
      if (voice) state.utterance.voice = voice;
      state.utterance.lang = 'zh-HK';
      state.utterance.rate = 0.95; 

      state.utterance.onend = () => {
        btn.classList.remove('playing');
        btnText.innerText = '聆聽靈修內容';
      };

      state.utterance.onerror = () => {
        btn.classList.remove('playing');
        btnText.innerText = '聆聽靈修內容';
      };

      window.speechSynthesis.speak(state.utterance);
      btn.classList.add('playing');
      btnText.innerText = '停止聆聽';
    }

    function initApp() {
      document.getElementById('empty-state').style.display = 'none';
      const now = new Date();
      const currentDate = now.getDate();

      if (currentDate >= 1 && currentDate <= 31) {
        state.selectedDay = currentDate;
      } else {
        state.selectedDay = 1;
      }
      
      document.getElementById('status-text').innerText = `今日內容：5月${state.selectedDay}日`;

      renderCalendar();
      showDevotional(state.selectedDay);
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      for (let i = 1; i <= 31; i++) {
        const btn = document.createElement('button');
        btn.className = `day-btn ${i === state.selectedDay ? 'active' : ''}`;
        
        btn.innerHTML = `<span>${i}</span>`;
        btn.onclick = () => {
          state.selectedDay = i;
          updateCalendarUI();
          showDevotional(i);
        };
        
        grid.appendChild(btn);
      }
    }

    function updateCalendarUI() {
      const buttons = document.querySelectorAll('.day-btn');
      buttons.forEach((btn, index) => {
        if (index + 1 === state.selectedDay) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    function showDevotional(dayIndex) {
      // 切換日子時自動停止當前播放的語音
      if (window.speechSynthesis && window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        document.getElementById('tts-btn').classList.remove('playing');
        document.getElementById('play-btn-text').innerText = '聆聽靈修內容';
      }

      const contentArea = document.getElementById('content-area');
      const data = devotionals.find(d => d.day === dayIndex);
      
      if (data) {
        contentArea.style.display = 'block';
        
        document.getElementById('view-title').innerText = data.title;
        document.getElementById('view-bible').innerText = data.bible;

        const extraBibleTitle = document.getElementById('extra-bible-title');
        const extraBibleText = document.getElementById('view-extra-bible');
        if (data.extraBible) {
          extraBibleTitle.style.display = 'flex';
          extraBibleText.style.display = 'block';
          extraBibleText.innerText = data.extraBible;
        } else {
          extraBibleTitle.style.display = 'none';
          extraBibleText.style.display = 'none';
        }

        document.getElementById('view-reflection').innerText = data.reflection;
        document.getElementById('view-observation').innerText = data.observation;
        
        const medUl = document.getElementById('view-meditation');
        medUl.innerHTML = '';
        data.meditation.forEach(item => {
          const li = document.createElement('li');
          li.innerText = item;
          medUl.appendChild(li);
        });
        
        document.getElementById('view-prayer').innerText = data.prayer;

        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });

      } else {
        contentArea.style.display = 'none';
      }
    }

    window.onload = initApp;

  </script>
